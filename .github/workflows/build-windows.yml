name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install anthropic openai-whisper sounddevice numpy customtkinter websockets python-osc openpyxl scipy
          pip install pyinstaller

      - name: config.json 기본값 생성
        run: |
          echo '{"api_key":"","model":"claude-opus-4-6","mic_index":null,"mic_name":"","osc_ip":"127.0.0.1","osc_port":9001,"osc_address":"/prompt","websocket_port":9000,"whisper_model":"base","vad_threshold":0.01,"silence_duration":1.5}' > config.json

      - name: Whisper base 모델 사전 다운로드
        run: python -c "import whisper; whisper.load_model('base')"

      - name: PyInstaller 빌드
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: 빌드 결과 확인
        run: |
          dir dist\agent\

      - name: ZIP 압축
        run: |
          Compress-Archive -Path "dist\agent\*" -DestinationPath "agent_Windows.zip"
        shell: powershell

      - name: 버전 및 릴리즈 노트 생성
        id: version
        run: python .github/gen_release_notes.py ${{ github.run_number }}

      - name: GitHub Release 생성 및 EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "멀티턴 대화형 에이전트 ${{ steps.version.outputs.tag }}"
          body_path: release_body.txt
          files: |
            agent_Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
